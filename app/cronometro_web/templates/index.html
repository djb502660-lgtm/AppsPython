<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h1 class="mb-4">Cronómetro Web</h1>
        <p id="tiempo" class="display-1 fw-bold text-primary mb-4">00:00:00</p>
        <div class="d-flex justify-content-center gap-2">
            <button id="btnIniciar" class="btn btn-success px-4">Iniciar</button>
            <button id="btnPausar" class="btn btn-warning px-4" disabled>Pausar</button>
            <button id="btnReiniciar" class="btn btn-secondary px-4">Reiniciar</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
